<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kayıt Ol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 text-gray-800">
  <div class="container max-w-md mx-auto mt-5 bg-white p-4 rounded shadow">
    <h2 class="text-xl text-blue-700 font-bold mb-4 text-center">Kayıt Ol</h2>
    <form method="post">
      <div>
        <label for="name" class="form-label">Kullanıcı Adı</label>
        <input type="text" class="form-control mb-3" id="name" name="name" placeholder="Kullanıcı Adı" required>
      </div>
      <div>
        <label for="email" class="form-label">E-posta</label>
        <input type="email" class="form-control mb-3" id="email" name="email" placeholder="E-posta" required>
      </div>
      <div>
        <label for="password" class="form-label">Şifre</label>
        <input type="password" class="form-control mb-3" id="password" name="password" placeholder="Şifre" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Kayıt Ol</button>
    </form>
    <div class="text-center mt-3">
      <a href="/login" class="text-blue-600 hover:underline">Zaten hesabınız var mı? Giriş yap</a>
    </div>
  </div>
</body>
</html>
